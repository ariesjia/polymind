<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="120" y2="120" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
  </defs>
  <rect width="120" height="120" rx="26" fill="url(#bg)"/>
  <!-- Stylized P formed by a diamond/polygon shape and vertical stroke -->
  <!-- Vertical bar of P -->
  <line x1="40" y1="28" x2="40" y2="92" stroke="#fff" stroke-width="5" stroke-linecap="round" opacity="0.95"/>
  <!-- Diamond head of P (representing a mind/polygon) -->
  <polygon points="40,28 72,38 80,54 72,70 40,60" fill="none" stroke="#fff" stroke-width="4" stroke-linejoin="round" opacity="0.9"/>
  <!-- Three neural dots radiating from the diamond -->
  <circle cx="88" cy="38" r="3" fill="#fff" opacity="0.6"/>
  <circle cx="92" cy="54" r="3" fill="#fff" opacity="0.6"/>
  <circle cx="88" cy="70" r="3" fill="#fff" opacity="0.6"/>
  <!-- Subtle connection lines to dots -->
  <line x1="72" y1="38" x2="85" y2="38" stroke="#fff" stroke-width="1.5" stroke-linecap="round" opacity="0.35"/>
  <line x1="80" y1="54" x2="89" y2="54" stroke="#fff" stroke-width="1.5" stroke-linecap="round" opacity="0.35"/>
  <line x1="72" y1="70" x2="85" y2="70" stroke="#fff" stroke-width="1.5" stroke-linecap="round" opacity="0.35"/>
  <!-- Central dot inside the diamond (focus/mind point) -->
  <circle cx="58" cy="49" r="4" fill="#fff" opacity="0.85"/>
</svg>
